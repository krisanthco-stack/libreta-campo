<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>Agrimensor Pro - CR Final</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdf6e3; padding: 15px; font-size: 18px; color: #333; margin: 0; }
        #map { height: 40vh; border: 4px solid #5d4037; border-radius: 8px; margin-bottom: 15px; }
        .stats { background: #e0d5c1; padding: 15px; margin: 10px 0; border: 2px solid #5d4037; font-size: 18px; font-weight: bold; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { background: #5d4037; color: white; padding: 15px; border: none; font-weight: bold; font-size: 16px; border-radius: 6px; cursor: pointer; }
        .punto-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 2px solid #ccc; font-size: 16px; }
        .del-btn { background: #8b0000; color: white; padding: 6px 12px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <h3>Agrimensor Pro (Costa Rica)</h3>
    <div id="map"></div>
    <div class="stats">Área: <span id="area-val">0</span> m² | Dist: <span id="dist-val">0</span> m</div>
    
    <div class="grid">
        <button onclick="marcarGPS()">📍 GPS Preciso</button>
        <button id="btn-manual" onclick="toggleManual()">🖱️ Modo Clic</button>
        <button onclick="toggleMapa()">🛰️ Mapa/Sat</button>
        <button onclick="exportarCSV()">💾 Exportar CSV</button>
        <button onclick="exportarDXF()">🏗️ Exportar DXF</button>
        <button onclick="document.getElementById('file-input').click()" style="background:#2e5339;">📂 Importar CSV</button>
        <button onclick="borrar()" style="background: #8b0000; grid-column: span 2;">❌ Limpiar Todo</button>
    </div>
    <input type="file" id="file-input" style="display:none" onchange="importarCSV(this)">
    <ul id="lista-puntos" style="padding: 0; margin-top: 20px;"></ul>

    <script>
        let puntos = JSON.parse(localStorage.getItem('puntos') || '[]');
        let map = L.map('map').setView([10.0, -84.0], 8);
        let modoSat = false, modoManual = false;
        let osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {attribution: 'Esri'});
        let marcadores = L.layerGroup().addTo(map);
        let poligono = L.polygon([], {color: '#2e5339', weight: 4}).addTo(map);

        function toCRTM05(lat, lon) {
            const rad = Math.PI / 180;
            const x = 500000 + (lon - (-84.0)) * 111320 * Math.cos(lat * rad);
            const y = lat * 110574;
            return { x: x.toFixed(2), y: y.toFixed(2) };
        }

        function calcularDistancia(pts) {
            let d = 0;
            for(let i=0; i < pts.length - 1; i++) {
                let p1 = pts[i], p2 = pts[i+1];
                d += Math.sqrt(Math.pow((p2.lat-p1.lat)*110574, 2) + Math.pow((p2.lon-p1.lon)*111320, 2));
            }
            return d.toFixed(2);
        }

        function render() {
            marcadores.clearLayers();
            const lista = document.getElementById('lista-puntos');
            lista.innerHTML = "";
            puntos.forEach((p, i) => {
                let crt = toCRTM05(p.lat, p.lon);
                L.marker([p.lat, p.lon]).addTo(marcadores).bindPopup(`P${i+1}: N${crt.y}, E${crt.x}`);
                const li = document.createElement('li');
                li.className = 'punto-item';
                li.innerHTML = `P${i+1} (N:${crt.y}, E:${crt.x}) <span class="del-btn" onclick="eliminar(${i})">X</span>`;
                lista.appendChild(li);
            });
            poligono.setLatLngs(puntos.map(p => [p.lat, p.lon]));
            document.getElementById('dist-val').innerText = calcularDistancia(puntos);
            localStorage.setItem('puntos', JSON.stringify(puntos));
            if(puntos.length > 0) map.setView([puntos[puntos.length-1].lat, puntos[puntos.length-1].lon], 18);
        }

        function marcarGPS() {
            navigator.geolocation.getCurrentPosition(pos => {
                puntos.push({ lat: pos.coords.latitude, lon: pos.coords.longitude });
                render();
            }, (e) => alert("Error GPS: " + e.message), {enableHighAccuracy: true, timeout: 20000});
        }

        function exportarDXF() {
            let dxf = "0\nSECTION\n2\nENTITIES\n0\nPOLYLINE\n8\n0\n" + 
                      puntos.map(p => { let c = toCRTM05(p.lat, p.lon); return `0\nVERTEX\n10\n${c.x}\n20\n${c.y}\n`; }).join("") + 
                      "0\nSEQEND\n0\nENDSEC\n0\nEOF";
            let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([dxf])); a.download = 'medicion.dxf'; a.click();
        }

        function importarCSV(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                e.target.result.split('\n').slice(1).forEach(line => {
                    const cols = line.split(',');
                    if(cols.length >= 3) puntos.push({lat: parseFloat(cols[1]), lon: parseFloat(cols[2])});
                });
                render();
            };
            reader.readAsText(input.files[0]);
        }

        function toggleManual() { modoManual = !modoManual; document.getElementById('btn-manual').style.background = modoManual ? '#2e5339' : '#5d4037'; }
        function toggleMapa() { modoSat = !modoSat; modoSat ? (map.addLayer(sat), map.removeLayer(osm)) : (map.addLayer(osm), map.removeLayer(sat)); }
        function borrar() { if(confirm("¿Borrar todo?")) { puntos = []; render(); } }
        function eliminar(i) { puntos.splice(i, 1); render(); }
        function exportarCSV() { let csv = "ID,Norte,Este\n" + puntos.map((p,i) => `${i+1},${toCRTM05(p.lat,p.lon).y},${toCRTM05(p.lat,p.lon).x}`).join("\n"); let a = document.createElement('a'); a.href = 'data:text/csv,' + encodeURIComponent(csv); a.download = 'datos.csv'; a.click(); }
        map.on('click', (e) => { if(modoManual) { puntos.push({lat: e.latlng.lat, lon: e.latlng.lng}); render(); } });
        render();
    </script>
</body>
</html>
