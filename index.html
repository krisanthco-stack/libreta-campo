<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Libreta Agrimensura Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdf6e3; padding: 10px; }
        #map { height: 40vh; border: 3px solid #5d4037; }
        .stats { background: #e0d5c1; padding: 10px; margin: 10px 0; border: 1px solid #5d4037; font-weight: bold; }
        .punto-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #999; }
    </style>
</head>
<body>
    <h3>Libreta Agrimensura Pro</h3>
    <div id="map"></div>
    <div id="stats" class="stats">Área: <span id="area-val">0</span> m²</div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
        <button onclick="marcarGPS()">📍 GPS</button>
        <button id="btn-manual" onclick="toggleManual()">🖱️ Modo Clic</button>
        <button onclick="borrar()" style="background: #8b0000; color: white;">❌ Borrar</button>
        <button onclick="exportar()">💾 CSV</button>
    </div>
    <ul id="lista-puntos"></ul>

    <script>
        // Carga segura: recupera lo existente sin borrar
        let puntos = JSON.parse(localStorage.getItem('puntos') || '[]');
        let map = L.map('map').setView([10.46, -83.98], 15);
        let marcadores = L.layerGroup().addTo(map);
        let poligono = L.polygon([], {color: 'green'}).addTo(map);
        let modoManual = false;

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function calcularArea(pts) {
            if (pts.length < 3) return 0;
            const lat0 = pts[0].lat * Math.PI / 180;
            const R = 6378137;
            let coords = pts.map(p => ({
                x: (p.lon * Math.PI / 180) * Math.cos(lat0) * R,
                y: (p.lat * Math.PI / 180) * R
            }));
            let area = 0;
            for (let i = 0; i < coords.length; i++) {
                let j = (i + 1) % coords.length;
                area += (coords[i].x * coords[j].y) - (coords[j].x * coords[i].y);
            }
            return Math.abs(area / 2).toFixed(2);
        }

        function render() {
            marcadores.clearLayers();
            puntos.forEach((p, i) => {
                L.marker([p.lat, p.lon]).addTo(marcadores).bindPopup("P" + (i+1));
                const li = document.createElement('li');
                li.className = 'punto-item';
                li.innerHTML = `P${i+1}: ${p.lat.toFixed(5)}, ${p.lon.toFixed(5)} <button onclick="eliminar(${i})">X</button>`;
                document.getElementById('lista-puntos').appendChild(li);
            });
            poligono.setLatLngs(puntos.map(p => [p.lat, p.lon]));
            document.getElementById('area-val').innerText = calcularArea(puntos);
            // Guardado automático constante
            localStorage.setItem('puntos', JSON.stringify(puntos));
        }

        function marcarGPS() {
            navigator.geolocation.getCurrentPosition(pos => {
                puntos.push({ lat: pos.coords.latitude, lon: pos.coords.longitude });
                render();
            });
        }

        map.on('click', (e) => { if (modoManual) { puntos.push({ lat: e.latlng.lat, lon: e.latlng.lng }); render(); } });

        function toggleManual() {
            modoManual = !modoManual;
            document.getElementById('btn-manual').style.background = modoManual ? '#2e5339' : '';
        }

        function eliminar(i) { puntos.splice(i, 1); document.getElementById('lista-puntos').innerHTML = ''; render(); }
        function borrar() { if(confirm("¿Borrar todos los puntos?")) { puntos = []; document.getElementById('lista-puntos').innerHTML = ''; render(); } }
        
        function exportar() {
            let csv = "ID,Latitud,Longitud\n" + puntos.map((p, i) => `${i+1},${p.lat},${p.lon}`).join("\n");
            let a = document.createElement('a');
            a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
            a.download = 'datos_campo.csv';
            a.click();
        }

        render();
    </script>
</body>
</html>
