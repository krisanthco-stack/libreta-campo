<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>Libreta de Agrimensura Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        :root { --papel: #f4ecd8; --tierra: #5d4037; --rojo: #8b0000; --verde: #2e5339; }
        body { font-family: 'Courier New', monospace; background: var(--papel); color: var(--tierra); margin: 0; padding: 10px; }
        #map { height: 40vh; border: 3px solid var(--tierra); margin-bottom: 10px; cursor: crosshair; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        button { background: var(--tierra); color: var(--papel); border: none; padding: 10px; cursor: pointer; font-weight: bold; }
        .secondary { background: transparent; border: 1.5px solid var(--tierra); color: var(--tierra); }
        #status { font-size: 12px; margin: 8px 0; padding: 6px; border: 1px solid var(--tierra); }
        .stat-box { background: #e0d5c1; padding: 10px; margin-top: 10px; border: 1px solid var(--tierra); }
        .punto-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #ccc; font-size: 12px; }
    </style>
</head>
<body>
    <h3>Agrimensor Digital</h3>
    <div id="map"></div>
    <div class="grid">
        <button onclick="marcarPunto()" id="btn-marcar">📍 GPS</button>
        <button onclick="toggleModoManual()" id="btn-manual" class="secondary">📍+ Clic Mapa</button>
        <button onclick="exportarCSV()">💾 CSV</button>
        <button onclick="limpiarTodo()" style="background:var(--rojo);">❌ Limpiar</button>
    </div>
    <div id="status">Listo.</div>
    <div class="stat-box">Área: <span id="area-value">—</span></div>
    <ul id="lista-puntos"></ul>

    <script>
        let puntos = JSON.parse(localStorage.getItem('puntos') || '[]');
        let map, modoManual = false, marcadores = L.layerGroup(), polyline, poligono;

        function initMap() {
            map = L.map('map').setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OSM' }).addTo(map);
            marcadores.addTo(map);
            polyline = L.polyline([], {color: 'red'}).addTo(map);
            poligono = L.polygon([], {color: 'green'}).addTo(map);

            map.on('click', function(e) {
                if (modoManual) {
                    puntos.push({ lat: e.latlng.lat, lon: e.latlng.lng, sel: true });
                    localStorage.setItem('puntos', JSON.stringify(puntos));
                    render();
                }
            });
            render();
        }

        function toggleModoManual() {
            modoManual = !modoManual;
            document.getElementById('btn-manual').style.background = modoManual ? '#5d4037' : 'transparent';
            document.getElementById('btn-manual').style.color = modoManual ? '#f4ecd8' : '#5d4037';
        }

        function marcarPunto() {
            navigator.geolocation.getCurrentPosition(pos => {
                puntos.push({ lat: pos.coords.latitude, lon: pos.coords.longitude, sel: true });
                localStorage.setItem('puntos', JSON.stringify(puntos));
                render();
            });
        }

        function render() {
            const lista = document.getElementById('lista-puntos');
            lista.innerHTML = "";
            marcadores.clearLayers();
            puntos.forEach((p, i) => {
                const li = document.createElement('li');
                li.className = 'punto-item';
                li.innerHTML = `P${i+1}: ${p.lat.toFixed(5)}, ${p.lon.toFixed(5)} <button onclick="eliminar(${i})">X</button>`;
                lista.appendChild(li);
                L.marker([p.lat, p.lon]).addTo(marcadores);
            });
            polyline.setLatLngs(puntos.map(p => [p.lat, p.lon]));
            poligono.setLatLngs(puntos.map(p => [p.lat, p.lon]));
        }

        function eliminar(i) { puntos.splice(i, 1); localStorage.setItem('puntos', JSON.stringify(puntos)); render(); }
        function limpiarTodo() { puntos = []; localStorage.setItem('puntos', '[]'); render(); }
        function exportarCSV() { /* Tu lógica CSV previa */ }

        initMap();
    </script>
</body>
</html>
