<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>Agrimensor Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4ecd8; margin: 0; padding: 10px; }
        #map { height: 50vh; border: 3px solid #5d4037; margin-bottom: 10px; cursor: crosshair; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        button { background: #5d4037; color: #fff; border: none; padding: 12px; font-weight: bold; }
        .active-btn { background: #2e5339 !important; }
        #status { font-size: 13px; padding: 10px; background: #e0d5c1; margin-bottom: 10px; border: 1px solid #5d4037; }
        ul { list-style: none; padding: 0; }
        .punto-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #999; }
    </style>
</head>
<body>

    <h3>Libreta de Agrimensura</h3>
    <div id="map"></div>
    <div class="grid">
        <button onclick="marcarGPS()">📍 Usar GPS</button>
        <button id="btn-manual" onclick="toggleManual()">🖱️ Clic Mapa</button>
        <button onclick="limpiar()" style="background: #8b0000;">❌ Borrar</button>
        <button onclick="exportar()">💾 CSV</button>
    </div>
    <div id="status">Estado: Listo.</div>
    <ul id="lista-puntos"></ul>

    <script>
        let puntos = JSON.parse(localStorage.getItem('puntos') || '[]');
        let map, modoManual = false, marcadores = L.layerGroup(), polyline;

        map = L.map('map').setView([-34.6, -58.4], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        marcadores.addTo(map);
        polyline = L.polyline([], {color: 'red'}).addTo(map);

        map.on('click', (e) => {
            if (modoManual) {
                puntos.push({ lat: e.latlng.lat, lon: e.latlng.lng });
                guardarYRender();
            }
        });

        function toggleManual() {
            modoManual = !modoManual;
            document.getElementById('btn-manual').classList.toggle('active-btn');
            document.getElementById('status').innerText = modoManual ? "Modo: Tocá el mapa para sumar puntos." : "Modo: GPS activado.";
        }

        function marcarGPS() {
            document.getElementById('status').innerText = "Buscando satélites...";
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    puntos.push({ lat: pos.coords.latitude, lon: pos.coords.longitude });
                    guardarYRender();
                    document.getElementById('status').innerText = "Punto GPS guardado.";
                },
                (err) => {
                    document.getElementById('status').innerText = "Error GPS: " + err.message + ". (Revisá permisos en el candado 🔒)";
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function guardarYRender() {
            localStorage.setItem('puntos', JSON.stringify(puntos));
            render();
        }

        function render() {
            marcadores.clearLayers();
            const lista = document.getElementById('lista-puntos');
            lista.innerHTML = "";
            puntos.forEach((p, i) => {
                L.marker([p.lat, p.lon]).addTo(marcadores).bindPopup("Punto " + (i+1));
                const li = document.createElement('li');
                li.className = 'punto-item';
                li.innerHTML = `P${i+1}: ${p.lat.toFixed(5
